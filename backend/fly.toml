# fly.io deployment for the backend.
# Run: flyctl launch --no-deploy, then flyctl deploy
app = "marketmaker-sim"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
